<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastermind Puzzle Creator</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111;
    color:#fff;
    padding:40px 20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:30px;
}

.card{
    background:#1c1c1c;
    border:1px solid #333;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    background:#2b2b2b;
    color:white;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    background:#00b894;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00a383;
}

#result{
    display:none;
    margin-top:20px;
}

.output{
    background:#000;
    padding:15px;
    border-radius:8px;
    word-break:break-all;
    margin-bottom:15px;
}

.copyBtn{
    background:#0984e3;
}

.copyBtn:hover{
    background:#0874c7;
}

.preview{
    width:100%;
    max-height:180px;
    object-fit:cover;
    border-radius:10px;
    margin-top:10px;
    display:none;
}

.success{
    color:#00ff95;
    margin-top:10px;
}

.error{
    color:#ff7675;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

<h1>Mastermind Puzzle Creator</h1>
<p class="subtitle">
Paste image URLs and generate a playable puzzle link.
</p>

<div class="card">

<label>Cover Image URL</label>
<input id="cover" placeholder="https://i.imgur.com/example.jpg">

<img id="coverPreview" class="preview">

<label>Stage 1 Image URL</label>
<input id="stage1" placeholder="https://i.imgur.com/example.jpg">

<label>Stage 2 Image URL</label>
<input id="stage2" placeholder="https://i.imgur.com/example.jpg">

<label>Stage 3 Image URL</label>
<input id="stage3" placeholder="https://i.imgur.com/example.jpg">

<label>Stage 4 Image URL</label>
<input id="stage4" placeholder="https://i.imgur.com/example.jpg">

<label>Stage 5 Image URL</label>
<input id="stage5" placeholder="https://i.imgur.com/example.jpg">

<button onclick="generateGame()">
Generate Puzzle Link
</button>

<div id="message"></div>

</div>

<div id="result" class="card">

<h2 style="margin-bottom:15px;">Generated Link</h2>

<div id="generatedLink" class="output"></div>

<button class="copyBtn" onclick="copyLink()">
Copy Link
</button>

</div>

</div>

<!-- LZ-String -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

<script>

const fields = [
    "cover",
    "stage1",
    "stage2",
    "stage3",
    "stage4",
    "stage5"
];

document.getElementById("cover").addEventListener("input", e => {
    const img = document.getElementById("coverPreview");

    if(e.target.value.trim() !== ""){
        img.src = e.target.value.trim();
        img.style.display = "block";
    }else{
        img.style.display = "none";
    }
});

function randomCode() {

    let code = "";

    for(let i=0;i<4;i++){
        code += Math.floor(Math.random()*10);
    }

    return code;
}

function generateGame(){

    const message = document.getElementById("message");
    message.innerHTML = "";

    const cover = document.getElementById("cover").value.trim();
    const stage1 = document.getElementById("stage1").value.trim();
    const stage2 = document.getElementById("stage2").value.trim();
    const stage3 = document.getElementById("stage3").value.trim();
    const stage4 = document.getElementById("stage4").value.trim();
    const stage5 = document.getElementById("stage5").value.trim();

    if(
        !cover ||
        !stage1 ||
        !stage2 ||
        !stage3 ||
        !stage4 ||
        !stage5
    ){
        message.innerHTML =
        '<p class="error">Please fill in all image URLs.</p>';
        return;
    }

    const gameData = {

        cover: cover,

        stages: [

            {
                image: stage1,
                code: randomCode(),
                attempts: 8
            },
            {
                image: stage2,
                code: randomCode(),
                attempts: 7
            },
            {
                image: stage3,
                code: randomCode(),
                attempts: 6
            },
            {
                image: stage4,
                code: randomCode(),
                attempts: 5
            },
            {
                image: stage5,
                code: randomCode(),
                attempts: 4
            }

        ]

    };

    const json = JSON.stringify(gameData);

    const compressed =
    LZString.compressToEncodedURIComponent(json);

    const playUrl =
    `${window.location.origin}${window.location.pathname.replace('index.html','')}play.html#${compressed}`;

    document.getElementById("generatedLink").textContent =
    playUrl;

    document.getElementById("result").style.display =
    "block";

    message.innerHTML =
    '<p class="success">Puzzle created successfully.</p>';

    console.log("Codes:");
    console.table(
        gameData.stages.map((s,i)=>({
            Stage:i+1,
            Code:s.code
        }))
    );
}

function copyLink(){

    const text =
    document.getElementById("generatedLink").textContent;

    navigator.clipboard.writeText(text);

    alert("Link copied!");
}

</script>

</body>
</html>
